description = "Get the shredded physique of a gymnast, JOIN HERE:  https://gymnasticsmethod.com/start\n\nIf you want to have the strength, coordination and body control like gymnasts have, you should train like them.\n\nIn this video, I’m going to show you an epic pulling exercise that gymnasts do, but you may have never even tried!\n\nSo, which exercise is it?\n\nThe so called buttermaker.\n\nWhat? Excuse me?\n\nWhen you are in hanging and you do a circular movement with straight body. That sounds impressive right?\n\nSo this is the exercise we’ll talk about today, a typical gymnast strengthening exercise which you may have never tried.\n\nAn easier variation of this one which is known by more people is the ice cream maker, when you basically do the same movement but without the circles.\n\nThis is a separate exercise as many know, but actually an important prerequisite of the buttermaker, so we’ll discuss it in this video.\n\nHow can you benefit from these exercises?\n\nSo I think that’s clear that gymnasts always do their routines with maximal precision, tightness and control, and this is what they strive for while they do strength training.\n\nDuring the buttermaker and ice cream maker you will not only use your core, back and arms but will improve the whole body tension and your coordination as well, so these have more benefits than just building strength and muscle.\n\nGet the shredded physique of a gymnast, JOIN HERE:  https://gymnasticsmethod.com/start"
