description = "Get the shredded physique of a gymnast: https://gymnasticsmethod.com/start\n\nDownload the app, become a member and get full access:\n\nGoogle Play Store: https://play.google.com/store/apps/details?id=com.virfortis.gymmethod\n\nIncrease your posterior chain mobility: https://www.youtube.com/watch?v=4ejbmxDJyYw\n\nJefferson curl: https://www.youtube.com/watch?v=u0sdWsKSNt4\n\nThe V-sit up is a typical gymnast ab exercise that is perfect for beginners, requires no equipment and can build you a great sixpack.\n\nThis is one of the best, if not the best ab exercises you can do on the floor.\n\nWhile you start the movement from one side with ab crunches and leg raises, in the V sit ups  upper body and legs move at the same time.\n\nOn the top of that, since in the final progression thanks to the closed, straight legs and high arm position you work with the longest possible leverage and give your sixpack much bigger load compared to other exercises on the floor.\n\nIn order to be able to perform this exercise properly, it’s important to have the right explosiveness, coordination and rhythm, thanks to the explosive concetric and controlled eccentric phase, the rectus abdominis is exposed to a very intense load.\n\nIn essence, you cannot achieve a better load and contraction with just your own bodyweight, without equipment on the floor.\n\nGet the shredded physique of a gymnast: https://gymnasticsmethod.com/start\n\nDownload the app, become a member and get full access:\n\nGoogle Play Store: https://play.google.com/store/apps/details?id=com.virfortis.gymmethod"
