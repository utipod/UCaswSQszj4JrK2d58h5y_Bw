description = "Get the shredded physique of a gymnast! Join now on https://gymnasticsmethod.com/start\n\nThe pull-up is a really popular exercise, and if you are watching this video, I guess you do pull-ups too.\n\nBut are you sure that you’re benefiting the most out of this exercise?\n\nIn this video, we’re gonna do a test, a reality check, that will show how well you actually do the pull-ups!\n\nThe full range is when your chest touches the bar. That is the end, the ceiling of the exercise. This is how you can build strength and size in the maximal range of motion, and you can ensure the way to the muscle up.\n\nIf you want to go higher, than the chest to bar, then you need to do explosive pull-ups. Also, if you do it slow and controlled, you can do a slow muscle up which is another exercise.\n\nOf course you can say, that the chin over the bar pull-ups are enough to build muscle and I’ve already clarified that in the pull-up video, but the point here is that if you want to have maximal results and transfer effects in calishtenics, then I suggest you do practice in the full range of motion.\n\nBut this is not easy, I know. Based on the experience of hundreds of students I worked with, I know that even do one rep is difficult, not to mention more repetitions.\n\nLet's see how far you can go with this!\n\nGet the shredded physique of a gymnast! Join now on https://gymnasticsmethod.com/start"
