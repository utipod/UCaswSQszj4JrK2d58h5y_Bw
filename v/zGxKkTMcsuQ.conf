description = "Get the shredded physique of a gymnast, JOIN HERE:  https://gymnasticsmethod.com/start\n\nIf you want to have sixpack and strong core like gymnasts have, you can’t make a mistake by training as they do.\n\nOf course unfortunately the sixpack doesn’t depend only on your training, there are several important factors to achieve it, but this is for another video.\n\nBut one thing is for sure: you definitely need to train your abs and all around core, since core stability has an important role in your everyday life, not to mention your workouts.\n\nI don’t think that I need to explain this.\n\nAnd if you are working out, why not to train and the pros do, and besides getting the physique you want, build functional strength?\n\nDon’t worry, it doesn’t mean that we’ll start with the hardest exercises that you might have seen from gymnasts.\n\nThey also started somewhere which means there are beginner exercises and progressions, so there is no excuse to start!\n\nIn this video, we’ll continue the gymnast core workout series and will do a beginner workout, this time, focusing on the compression strength.\n\nGet the shredded physique of a gymnast, JOIN HERE:  https://gymnasticsmethod.com/start"
