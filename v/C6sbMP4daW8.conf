description = "Get the shredded physique of a gymnast: https://gymnasticsmethod.com/start\n\nDownload the app, become a member and get full access:\n\nGoogle Play Store: https://play.google.com/store/apps/details?id=com.virfortis.gymmethod\n\nApp Store: https://apps.apple.com/us/app/gymnastics-method/id1661126178\n\nYes, this is another video on how to do push ups!\n\nWhy though? Because you still do them wrong!\n\nAlright, alright, seriously, look around how many people do the push ups wrong.\n\nDid you record yourself to check how you do it though?\n\nThis is also an important thing, but the other reason I’m making this video, because many people don’t explain, what are the prerequisites of the push ups.\n\nIf you follow the channel and watched my previous videos, you know that the push ups and the other basic calishtenics exercises are not the first steps in calishtenics or bodyweight training.\n\nAnd if you haven’t watched them, I tell you now: the basic calishtenics exercises like push ups, pull ups, etc, are not the first step in calishtenics or bodyweight training.\n\nRather the second step. The first step is the joint preparation or prehab. You can find more info about these in my previous videos, but we’ll touch base this topic in this one as well.\n\nSo, almost nobody talks you about the joint preparation exercises for the push ups, and everybody comes with plenty of variations which only confuses people.\n\nThey can’t even do the regular push ups but they are already thinking about variations. So we could say “there is another variation where you just need to elevate your legs and do the push ups…\n\nNo….\n\nIn this video, we’re gonna check what you need to do before you start the regular push up and how to do it right if you want to benefit the most in calishtenics.\n\nGet the shredded physique like a gymnast, join now on https://gymnasticsmethod.com/start"
