title = "No More Chicken Legs: 3 Fundamental Exercises for Beginners"
description = "Get the shredded physique of a gymnast: https://gymnasticsmethod.com/start\n\nDownload the app, become a member and get full access:\n\nGoogle Play Store: https://play.google.com/store/apps/details?id=com.virfortis.gymmethod\n\nYou might seen gymnasts doing fast sprints, acrobatic skills on the floor or sticking to their dismount from the high bars that have a significant load on their legs.\n\nNone of these could be done without the proper basics that’s for sure.\n\nIn this video I’m going to show you the top 3 leg exercises for beginners that are highly recommended before you’re even thinking about using weights.\n\nYes, I believe that after a certain level it’s recommended to use weights for leg training, but let’s just not make the mistake that most people do with any type of training. Jumping right into the more advanced exercises and having injuries that destroys your motivation.\n\nYou need to get to the level where you start using weights and and you need to make sure that you have the right joint mobility, stability range of motion and technique.\n\nGymnasts are notorious about their thorough warm up and joint preparation process. This is really important for high level performance and avoiding injuries in the long run.\n\nI already talked about joint preparation in my previous videos and now it’s time to talk about the basics in terms of lower body strength, so let’s see the top 3 recommended leg exercises.\n\nGet the shredded physique of a gymnast: https://gymnasticsmethod.com/start\n\nDownload the app, become a member and get full access:\n\nGoogle Play Store: https://play.google.com/store/apps/details?id=com.virfortis.gymmethod"
